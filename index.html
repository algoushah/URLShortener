<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayoub - URL Shortener</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        
        body { 
            margin: 0; 
            padding: 0; 
            font-family: 'JetBrains Mono', monospace;
            background: #000;
            color: #fff;
        }
        
        .dot { 
            position: absolute; 
            background: #0f0; 
            border-radius: 50%; 
            pointer-events: none; 
            transition: all 0.2s ease-out;
            box-shadow: 0 0 10px #0f0;
        }
        
        .glow-text {
            text-shadow: 0 0 20px #0f0, 0 0 40px #0f0;
        }
        
        .terminal-border {
            border: 2px solid #0f0;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
        }
        
        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            animation: scanline 8s linear infinite;
            z-index: 1000;
        }
        
        @keyframes scanline {
            0% { background-position: 0 0; }
            100% { background-position: 0 100%; }
        }
        
        .flicker {
            animation: flicker 0.15s infinite;
        }
        
        @keyframes flicker {
            0% { opacity: 0.97; }
            50% { opacity: 1; }
            100% { opacity: 0.97; }
        }
        
        input:focus, button:focus {
            outline: none;
            box-shadow: 0 0 15px #0f0;
        }
        
        .cursor::after {
            content: '▋';
            animation: blink 1s infinite;
            color: #0f0;
        }
        
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
        
        .grid-bg {
            background-image: 
                linear-gradient(rgba(0, 255, 0, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 0, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
        }
    </style>
</head>
<body class="bg-black overflow-hidden grid-bg">
    <div class="scanline"></div>
    <div id="dots-container" class="fixed inset-0 pointer-events-none"></div>
    
    <div class="relative z-10 min-h-screen flex items-center justify-center p-4">
        <div class="w-full max-w-3xl">
            <!-- Header -->
            <div class="text-center mb-12 flicker">
                <div class="mb-6">
                    <span class="text-green-500 text-lg">[root@ayoub ~]$</span>
                    <span class="text-white ml-2">./url_shortener.sh</span>
                </div>
                <h1 class="text-7xl font-black text-green-500 tracking-tight mb-6 glow-text">
                    AYOUB
                </h1>
                <h2 class="text-3xl font-bold text-green-400 mb-3">
                    &gt; URL SHORTENER <span class="cursor"></span>
                </h2>
                <p class="text-green-600 font-mono">
                    // Transform long URLs into compact links instantly
                </p>
            </div>

            <!-- Main Terminal Card -->
            <div class="bg-black/90 backdrop-blur-sm rounded-lg border-2 border-green-500 shadow-2xl p-8 terminal-border">
                <!-- Terminal Header -->
                <div class="flex items-center gap-2 mb-6 pb-4 border-b border-green-500/30">
                    <div class="w-3 h-3 rounded-full bg-red-500"></div>
                    <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
                    <div class="w-3 h-3 rounded-full bg-green-500"></div>
                    <span class="ml-4 text-green-500 text-sm font-mono">terminal@ayoub:~/url-shortener</span>
                </div>

                <div class="space-y-5">
                    <div>
                        <label for="url-input" class="block text-green-500 font-mono mb-3">
                            <span class="text-green-400">$</span> Enter target URL:
                        </label>
                        <input 
                            id="url-input" 
                            type="text" 
                            placeholder="https://ayoub.pw/very/long/url/here" 
                            class="w-full px-5 py-4 bg-black border-2 border-green-500/50 rounded-lg focus:border-green-500 text-green-400 placeholder-green-900 font-mono transition"
                        />
                    </div>

                    <div id="error-message" class="hidden bg-red-900/30 border-2 border-red-500 text-red-400 px-5 py-4 rounded-lg text-sm font-mono">
                        <span class="text-red-500">[ERROR]</span> <span id="error-text"></span>
                    </div>

                    <button
                        id="shorten-btn"
                        class="w-full bg-green-500 hover:bg-green-400 text-black font-bold py-4 px-6 rounded-lg transition duration-300 shadow-lg font-mono uppercase tracking-wider"
                    >
                        &gt;&gt; Execute Shortening Protocol
                    </button>
                </div>

                <!-- Result Section -->
                <div id="result-section" class="hidden mt-8 pt-8 border-t-2 border-green-500/30">
                    <div class="mb-4">
                        <span class="text-green-500 font-mono">[SUCCESS]</span>
                        <span class="text-green-400 font-mono ml-2">URL shortened successfully</span>
                    </div>
                    <div class="bg-black/50 rounded-lg p-5 border-2 border-green-500/50">
                        <div class="flex items-center gap-3">
                            <div class="flex-1">
                                <div class="text-green-600 text-xs font-mono mb-1">&gt; OUTPUT:</div>
                                <div id="short-url" class="font-mono text-lg text-green-400 break-all"></div>
                            </div>
                            <button
                                id="copy-btn"
                                class="flex-shrink-0 p-3 bg-green-500/20 hover:bg-green-500/30 border-2 border-green-500 rounded-lg transition"
                                title="Copy to clipboard"
                            >
                                <span class="text-green-500 text-xl">📋</span>
                            </button>
                        </div>
                    </div>
                    <p id="copied-message" class="hidden text-sm text-green-400 mt-3 font-mono">
                        <span class="text-green-500">[✓]</span> Copied to clipboard
                    </p>
                </div>
            </div>

            <!-- Footer -->
            <div class="mt-8 text-center text-sm text-green-600 font-mono">
                <p>// Powered by TinyURL API | Never expires | Secure shortening</p>
            </div>
        </div>
    </div>

    <script>
        // Dots animation with green glow
        let mouseX = 0, mouseY = 0;
        document.addEventListener('mousemove', (e) => { 
            mouseX = e.clientX; 
            mouseY = e.clientY; 
            updateDots(); 
        });
        
        const dotsContainer = document.getElementById('dots-container');
        const dots = [];
        
        for (let i = 0; i < 40; i++) {
            const dot = document.createElement('div');
            dot.className = 'dot';
            const size = Math.random() * 3 + 1;
            dot.style.width = size + 'px';
            dot.style.height = size + 'px';
            dot.style.left = Math.random() * 100 + '%';
            dot.style.top = Math.random() * 100 + '%';
            dotsContainer.appendChild(dot);
            dots.push(dot);
        }
        
        function updateDots() {
            dots.forEach(dot => {
                const rect = dot.getBoundingClientRect();
                const dotX = rect.left + rect.width / 2;
                const dotY = rect.top + rect.height / 2;
                const distance = Math.sqrt(Math.pow(mouseX - dotX, 2) + Math.pow(mouseY - dotY, 2));
                const influence = Math.max(0, 1 - distance / 200);
                const offsetX = (mouseX - dotX) * influence * 0.3;
                const offsetY = (mouseY - dotY) * influence * 0.3;
                dot.style.transform = `translate(${offsetX}px, ${offsetY}px)`;
                dot.style.opacity = 0.3 + influence * 0.7;
            });
        }

        // URL Shortener Logic
        const urlInput = document.getElementById('url-input');
        const shortenBtn = document.getElementById('shorten-btn');
        const errorMessage = document.getElementById('error-message');
        const errorText = document.getElementById('error-text');
        const resultSection = document.getElementById('result-section');
        const shortUrlDiv = document.getElementById('short-url');
        const copyBtn = document.getElementById('copy-btn');
        const copiedMessage = document.getElementById('copied-message');

        function isValidUrl(string) {
            try { 
                const url = new URL(string); 
                return url.protocol === 'http:' || url.protocol === 'https:'; 
            } catch (_) { 
                return false; 
            }
        }

        shortenBtn.addEventListener('click', async () => {
            const longUrl = urlInput.value.trim();
            errorMessage.classList.add('hidden');
            resultSection.classList.add('hidden');

            if (!longUrl) {
                errorText.textContent = 'URL cannot be empty';
                errorMessage.classList.remove('hidden');
                return;
            }
            
            if (!isValidUrl(longUrl)) {
                errorText.textContent = 'Invalid URL format. Must start with http:// or https://';
                errorMessage.classList.remove('hidden');
                return;
            }

            shortenBtn.textContent = '>> Processing...';
            shortenBtn.disabled = true;

            try {
                const response = await fetch(`https://tinyurl.com/api-create.php?url=${encodeURIComponent(longUrl)}`);
                const shortUrl = await response.text();
                
                if (shortUrl && shortUrl.startsWith('http')) {
                    shortUrlDiv.textContent = shortUrl;
                    resultSection.classList.remove('hidden');
                } else {
                    errorText.textContent = 'Failed to shorten URL. Please try again.';
                    errorMessage.classList.remove('hidden');
                }
            } catch (error) {
                errorText.textContent = 'Connection error. Unable to reach shortening service.';
                errorMessage.classList.remove('hidden');
            } finally {
                shortenBtn.textContent = '>> Execute Shortening Protocol';
                shortenBtn.disabled = false;
            }
        });

        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(shortUrlDiv.textContent).then(() => {
                copyBtn.innerHTML = '<span class="text-green-500 text-xl">✓</span>';
                copiedMessage.classList.remove('hidden');
                setTimeout(() => { 
                    copyBtn.innerHTML = '<span class="text-green-500 text-xl">📋</span>';
                    copiedMessage.classList.add('hidden'); 
                }, 2000);
            });
        });

        urlInput.addEventListener('keypress', (e) => { 
            if (e.key === 'Enter') shortenBtn.click(); 
        });
    </script>
</body>
</html>
